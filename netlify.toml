# Netlify config for the Astro-built Cybercon Solutions site.

[build]
  publish = "dist"
  command = "npm run build"

# Fonts never change — cache them hard.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible baseline security headers for a static marketing site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
